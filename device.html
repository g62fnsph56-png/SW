<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設備頁</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: "Microsoft JhengHei", sans-serif;
  background: linear-gradient(180deg, #6ec6ff, #b3e5fc);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* ⭐ 卡片 */
.container {
  width: 92%;
  max-width: 440px;
  background: rgba(255,255,255,0.96);
  border-radius: 22px;
  padding: 45px 30px 90px; /* ⭐ 下方留空給按鈕 */
  box-shadow: 0 20px 45px rgba(0,0,0,0.18);
  position: relative;
  animation: popIn 0.6s ease;
}

/* 進場動畫 */
@keyframes popIn {
  from {
    transform: scale(0.9);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

/* 左上 */
.top-bar {
  position: absolute;
  top: 18px;
  left: 22px;
  font-size: 14px;
  color: #555;
  line-height: 1.6;
}

/* ⭐ 重點：2欄排列 */
.menu {
  margin-top: 55px;
  display: grid;
  grid-template-columns: 1fr 1fr; /* ⭐ 每行兩個 */
  gap: 22px; /* 間距 */
}

/* ⭐ 按鈕 */
.menu button {
  height: 80px;
  border: none;
  border-radius: 18px;
  font-size: 15px;
  color: white;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 8px 18px rgba(0,0,0,0.12);
}

/* hover */
.menu button:hover {
  transform: translateY(-4px) scale(1.03);
  filter: brightness(1.08);
}

/* click */
.menu button:active {
  transform: scale(0.97);
}

/* 選取 */
.menu button.active {
  box-shadow: 0 0 0 3px rgba(255,255,255,0.7) inset,
              0 0 18px rgba(0,0,0,0.15);
}

/* 顏色 */
.btn-speaker {
  background: linear-gradient(135deg, #ab47bc, #8e24aa);
}

.btn-laptop {
  background: linear-gradient(135deg, #42a5f5, #1e88e5);
}

.btn-projector {
  background: linear-gradient(135deg, #ef5350, #e53935);
}

.btn-pointer {
  background: linear-gradient(135deg, #26c6da, #00acc1);
}

/* ⭐ 下方按鈕（往下貼底） */
.bottom-btn {
  position: absolute;
  bottom: 18px;
  width: 44%;
  height: 52px;
  border: none;
  border-radius: 16px;
  color: white;
  font-size: 15px;
  transition: 0.2s;
  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

/* hover */
.bottom-btn:hover {
  transform: translateY(-3px);
}

.submit-btn {
  left: 20px;
  background: #43a047;
}

.back-btn {
  right: 20px;
  background: #757575;
}
</style>
</head>

<body>

<div class="container">

  <!-- 左上 -->
  <div class="top-bar">
    <div id="time"></div>
    <div id="name"></div>
  </div>

  <!-- 中間 -->
  <div class="menu">
    <button class="btn-speaker" onclick="toggleDevice(this,'揚聲器')">
      <i class="fa-solid fa-volume-high"></i> 揚聲器
    </button>

    <button class="btn-laptop" onclick="toggleDevice(this,'筆記型電腦')">
      <i class="fa-solid fa-laptop"></i> 筆記型電腦
    </button>

    <button class="btn-projector" onclick="toggleDevice(this,'單槍')">
      <i class="fa-solid fa-video"></i> 單槍
    </button>

    <button class="btn-pointer" onclick="toggleDevice(this,'簡報筆')">
      <i class="fa-solid fa-pen"></i> 簡報筆
    </button>
  </div>

  <!-- 下方 -->
  <button class="bottom-btn submit-btn" onclick="submitData()">
    送出
  </button>

  <button class="bottom-btn back-btn" onclick="goBack()">
    返回
  </button>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyLe7PjmtC5efI4mjx1ChAVhnFZ77TN7DwxUwtJgQwr3STzjVxeeRBLaHJx5qS1DPV_hA/exec";

// ⭐ 時間
function updateTime() {
  document.getElementById("time").innerText =
    new Date().toLocaleString("zh-TW");
}
setInterval(updateTime, 1000);
updateTime();

// ⭐ 姓名
const name = localStorage.getItem("name") || "訪客";
document.getElementById("name").innerText = "👤 " + name;

// ⭐ 多選設備
let selectedDevices = [];

function toggleDevice(btn, device) {

  if (selectedDevices.includes(device)) {
    selectedDevices = selectedDevices.filter(d => d !== device);
    btn.classList.remove("active");
  } else {
    selectedDevices.push(device);
    btn.classList.add("active");
  }
}

// ⭐ 送出
function submitData() {

  if (selectedDevices.length === 0) {
    alert("請先選擇設備");
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "device",
      name: name,
      device: selectedDevices.join(", "),
      time: new Date().toLocaleString("zh-TW")
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.status === "success") {

      // ⭐ 送出後才顯示
      alert("你選擇了：" + selectedDevices.join(", "));

    } else {
      alert("送出失敗");
    }
  })
  .catch(() => alert("連線錯誤"));
}

// 返回
function goBack() {
  window.location.href = "main.html";
}

</script>

</body>
</html>
